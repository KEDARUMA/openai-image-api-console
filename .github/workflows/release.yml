name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-15
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - name: macOS Intel
            os: macos-15-intel
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            args: ""
            rust-targets: ""
          - name: Linux
            os: ubuntu-22.04
            args: ""
            rust-targets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Set release version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            echo "Release tag must use v-prefixed semver, for example v1.0.1."
            exit 1
          fi
          export VERSION
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node - <<'JS'
          const fs = require("fs");
          const version = process.env.VERSION;

          const tauriConfigPath = "src-tauri/tauri.conf.json";
          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, "utf8"));
          tauriConfig.version = version;
          fs.writeFileSync(tauriConfigPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);

          const cargoTomlPath = "src-tauri/Cargo.toml";
          const cargoToml = fs.readFileSync(cargoTomlPath, "utf8");
          const nextCargoToml = cargoToml.replace(
            /(\[package\][\s\S]*?\nversion\s*=\s*)"[^"]+"/,
            `$1"${version}"`,
          );
          if (nextCargoToml === cargoToml) {
            throw new Error("Could not update src-tauri/Cargo.toml package version.");
          }
          fs.writeFileSync(cargoTomlPath, nextCargoToml);
          JS
          cargo metadata --manifest-path src-tauri/Cargo.toml --format-version 1 --no-deps > /dev/null

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OpenAI Image API Console ${{ github.ref_name }}
          releaseBody: Download the installer or package for your OS from the assets below.
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
          args: ${{ matrix.args }}
